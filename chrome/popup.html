<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>PiQPull</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="popup-header">
    <div id="header-title">PiQPull</div>
    <div id="header-version"></div>
  </div>

  <div class="inner">
    <div id="setupNotice" class="status info" hidden>
      Organization ID not configured.
      <a href="#" id="openOptions">Click here to set it up</a>
    </div>

    <div class="options">
      <div class="export-row">
        <label>
          Chat format:
          <select id="format">
            <option value="json">JSON</option>
            <option value="markdown">Markdown</option>
            <option value="text">Plain Text</option>
            <option value="jsonl">JSONL</option>
          </select>
        </label>
        <label title="Include conversation messages in the exported file">
          <input type="checkbox" id="includeChats" checked>
          Chats
        </label>
        <label title="Include extended thinking blocks">
          <input type="checkbox" id="includeThinking">
          Extended Thinking
        </label>
        <label title="Add conversation metadata at the top of exported files">
          <input type="checkbox" id="includeMetadata">
          Metadata
        </label>
      </div>

      <div class="export-row">
        <label>
          Artifact format:
          <select id="artifactFormat">
            <option value="original">Original</option>
            <option value="markdown">Markdown</option>
            <option value="text">Plain Text</option>
            <option value="json">JSON</option>
          </select>
        </label>
        <label title="Include artifacts inline within the conversation text">
          <input type="checkbox" id="includeArtifacts">
          Inline Artifacts
        </label>
        <label title="Extract artifacts as separate files in nested folders">
          <input type="checkbox" id="extractArtifacts">
          Nested Artifacts
        </label>
        <label title="Flatten artifacts — no subfolders, conversation name prefix">
          <input type="checkbox" id="flattenArtifacts">
          Flat Artifacts
        </label>
        <label title="Also push JSONL to PiQuix server at localhost:7432">
          <input type="checkbox" id="serverPush">
          Push to PiQuix
        </label>
      </div>
    </div>

    <button id="exportCurrent">Export Current Conversation</button>
    <button id="exportAll">Export All Conversations</button>
    <button id="browseConversations">Browse All Conversations</button>

    <div id="status"></div>
  </div>

  <script src="popup-theme.js"></script>
  <script src="utils.js"></script>
  <script src="popup.js"></script>
</body>
</html>
