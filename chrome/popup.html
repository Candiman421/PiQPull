<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>PiQPull</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="popup-header">
    <div id="header-title">PiQPull</div>
    <div id="header-version"></div>
  </div>

  <div class="inner">

    <div id="setupNotice" class="status info" hidden>
      Organization ID not configured.
      <a href="#" id="openOptions">Set it up in Settings</a>
    </div>

    <button id="exportCurrent">Export Conversation</button>

    <!-- Project home download — project selection required -->
    <div class="option-group option-group-home">
      <label class="project-label" for="piQuixProjectSelect">
        PiQuix project
        <span class="project-label-hint">(for home download)</span>
        <span id="projectLoadStatus" class="project-load-status"></span>
      </label>
      <select id="piQuixProjectSelect">
        <option value="">— select project —</option>
      </select>
      <div id="projectRouteNote" class="route-note hidden">
        <code id="projectRoutePath">incoming\PiQPull\…\{chat}\</code>
        <span class="route-note-detail">· conversations always route here automatically</span>
      </div>
    </div>
    <button id="exportProjectHome" disabled>Download Project Home</button>

    <button id="browseConversations">Browse All Conversations</button>

    <div id="status"></div>
  </div>

  <script src="popup-theme.js"></script>
  <script src="utils.js"></script>
  <script src="popup.js"></script>
</body>
</html>
